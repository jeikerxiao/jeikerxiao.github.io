        <p>Spring Junit4 单元测试</p>
<h1 id="Spring"><a href="#Spring" class="headerlink" title="Spring"></a>Spring</h1><figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div></pre></td><td class="code"><pre><div class="line">@RunWith(SpringJUnit4ClassRunner.class)//基于Junit4的Spring测试框架</div><div class="line">@ContextConfiguration(location=&#123;&quot;/applicationContext.xml&quot;&#125;)//启动Spring容器</div><div class="line">public class TestUserService&#123;</div><div class="line"></div><div class="line">    //注入Spring容器中的bean</div><div class="line">    @AutoWired</div><div class="line">    private UserService userService；</div><div class="line"></div><div class="line">    @Test</div><div class="line">    public void hasMatchUser()&#123;</div><div class="line">        boolean result = userService.hasMatchUser(&quot;admin&quot;,&quot;123456&quot;);</div><div class="line"></div><div class="line">        Assert.assertTrue(&quot;错误,结果非预期&quot;, result);</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<h1 id="Spring-MVC"><a href="#Spring-MVC" class="headerlink" title="Spring MVC"></a>Spring MVC</h1><p>测试Controller层</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div><div class="line">38</div><div class="line">39</div><div class="line">40</div><div class="line">41</div><div class="line">42</div><div class="line">43</div><div class="line">44</div></pre></td><td class="code"><pre><div class="line">@RunWith(SpringJUnit4ClassRunner.class)</div><div class="line">@ContextConfiguration(&#123;&quot;classpath*:/applicationContext.xml&quot;,&quot;classpath*:/spring-mvc.xml&quot;&#125;)</div><div class="line">public class TestController &#123;</div><div class="line"></div><div class="line">    private MockMvc mockMvc;</div><div class="line"></div><div class="line">    @Autowired</div><div class="line">    WebApplicationContext webApplicationContext;</div><div class="line"></div><div class="line">    @Before</div><div class="line">    public void setUp()&#123;</div><div class="line">        mockMvc = MockMvcBuilders.webAppContextSetup(webApplicationContext).build();</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    @Test</div><div class="line">    public void testLogin() &#123;</div><div class="line"></div><div class="line">        String url = &quot;/citys/1&quot;;</div><div class="line"></div><div class="line">        MvcResult mvcResult = mockMvc.perform(MockMvcRequestBuilders.get(url)</div><div class="line">                                                                    .accept(MediaType.APPLICATION_JSON))</div><div class="line">                                     .andReturn();</div><div class="line"></div><div class="line">        int status = mvcResult.getResponse().getStatus();</div><div class="line">        String data = mvcResult.getResponse().getContentAsString();</div><div class="line"></div><div class="line">        logger.info(&quot;返回的数据: &#123;&#125;&quot;, data);</div><div class="line"></div><div class="line">        // jackson 转化使用</div><div class="line">        ObjectMapper mapper = new ObjectMapper();</div><div class="line">        City city = mapper.readValue(data, City.class);</div><div class="line">        String dataStr = mapper.writeValueAsString(city);</div><div class="line"></div><div class="line">        // fastjson 转化使用</div><div class="line">        City cityObj = JSON.parseObject(data, City.class);</div><div class="line">        String cityStr = JSON.toJSONString(cityObj);</div><div class="line"></div><div class="line">        logger.info(&quot;jackson转化后的数据: &#123;&#125;&quot;, dataStr);</div><div class="line">        logger.info(&quot;fastjson转化后的数据: &#123;&#125;&quot;, cityStr);</div><div class="line"></div><div class="line">        assertTrue(&quot;错误,正确返回值应该为200&quot;, status == 200);</div><div class="line">        assertTrue(&quot;错误,正确应该是1&quot;, city.getId() == 1);</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<h1 id="Spring-Boot"><a href="#Spring-Boot" class="headerlink" title="Spring Boot"></a>Spring Boot</h1><p>测试Controller层</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div><div class="line">38</div><div class="line">39</div><div class="line">40</div><div class="line">41</div><div class="line">42</div><div class="line">43</div><div class="line">44</div><div class="line">45</div><div class="line">46</div><div class="line">47</div></pre></td><td class="code"><pre><div class="line">@RunWith(SpringRunner.class)</div><div class="line">@SpringBootTest</div><div class="line">public class CityControllerTest &#123;</div><div class="line"></div><div class="line">    private final Logger logger = LoggerFactory.getLogger(this.getClass());</div><div class="line"></div><div class="line">    private MockMvc mockMvc;</div><div class="line"></div><div class="line">    @Autowired</div><div class="line">    WebApplicationContext webApplicationContext;</div><div class="line"></div><div class="line">    @Before</div><div class="line">    public void setUp() throws Exception &#123;</div><div class="line">        mockMvc = MockMvcBuilders.webAppContextSetup(webApplicationContext).build();</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    @Test</div><div class="line">    public void findCityById() throws Exception &#123;</div><div class="line"></div><div class="line">        String url = &quot;/citys/1&quot;;</div><div class="line"></div><div class="line">        MvcResult mvcResult = mockMvc.perform(MockMvcRequestBuilders.get(url)</div><div class="line">                                                                    .accept(MediaType.APPLICATION_JSON))</div><div class="line">                                     .andReturn();</div><div class="line"></div><div class="line">        int status = mvcResult.getResponse().getStatus();</div><div class="line">        String data = mvcResult.getResponse().getContentAsString();</div><div class="line"></div><div class="line">        logger.info(&quot;返回的数据: &#123;&#125;&quot;, data);</div><div class="line"></div><div class="line">        // jackson 转化使用</div><div class="line">        ObjectMapper mapper = new ObjectMapper();</div><div class="line">        City city = mapper.readValue(data, City.class);</div><div class="line">        String dataStr = mapper.writeValueAsString(city);</div><div class="line"></div><div class="line">        // fastjson 转化使用</div><div class="line">        City cityObj = JSON.parseObject(data, City.class);</div><div class="line">        String cityStr = JSON.toJSONString(cityObj);</div><div class="line"></div><div class="line">        logger.info(&quot;jackson转化后的数据: &#123;&#125;&quot;, dataStr);</div><div class="line">        logger.info(&quot;fastjson转化后的数据: &#123;&#125;&quot;, cityStr);</div><div class="line"></div><div class="line">        assertTrue(&quot;错误,正确返回值应该为200&quot;, status == 200);</div><div class="line">        assertTrue(&quot;错误,正确应该是1&quot;, city.getId() == 1);</div><div class="line"></div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>测试Dao层</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div></pre></td><td class="code"><pre><div class="line">@RunWith(SpringRunner.class)</div><div class="line">@SpringBootTest</div><div class="line">public class CityMapperTest &#123;</div><div class="line"></div><div class="line">    @Autowired</div><div class="line">    CityMapper cityMapper;</div><div class="line"></div><div class="line">    @Test</div><div class="line">    public void selectByPrimaryKey() throws Exception &#123;</div><div class="line">        City city = cityMapper.selectByPrimaryKey(1);</div><div class="line">        assertTrue(&quot;错误:返回结果应该为1.&quot;, city.getId() == 1);</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
